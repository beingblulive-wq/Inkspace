<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Creative Social Sanctuary</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --sanctuary-cream: #F7F3EC;
            --ink-black: #1A1A1A;
            --moonbeam-silver: #DDE1E6;
            --rose-ember: #C94F5C;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Inter', sans-serif;
        }

        body {
            background-color: var(--sanctuary-cream);
            color: var(--ink-black);
            font-family: var(--font-sans);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            animation: fadeIn 2s ease-out backwards;
            text-align: center;
        }

        .greeting-container {
            text-align: center;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .greeting-text {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            font-weight: 400;
            color: var(--ink-black);
            font-style: italic;
            transition: color 0.5s ease;
            margin-bottom: 2rem;
        }

        /* Chat Interface */
        .chat-container {
            display: flex;
            gap: 0.5rem;
            width: 100%;
            max-width: 400px;
        }

        .chat-input {
            flex-grow: 1;
            background: transparent;
            border: 1px solid var(--moonbeam-silver);
            border-radius: 30px;
            padding: 0.75rem 1.5rem;
            font-family: var(--font-sans);
            font-size: 1rem;
            color: var(--ink-black);
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input:focus, .chat-input:hover {
            border-color: var(--rose-ember);
            box-shadow: 0 0 10px rgba(201, 79, 92, 0.2);
        }

        .send-btn {
            background: var(--sanctuary-cream);
            border: 1px solid var(--moonbeam-silver);
            color: var(--ink-black);
            padding: 0.75rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            font-family: var(--font-sans);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .send-btn:hover {
            border-color: var(--rose-ember);
            color: var(--rose-ember);
            box-shadow: 0 0 10px rgba(201, 79, 92, 0.2);
        }

        /* Holon Mascot Canvas */
        .holon-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 1.5rem auto;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            filter: hue-rotate(10deg) saturate(1.5) brightness(1.1);
        }

        #holonCanvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateZ(0);
            border-radius: 50%;
            pointer-events: auto; 
            background: transparent;
        }

        .back-link {
            position: fixed;
            top: 2rem;
            left: 2rem;
            text-decoration: none;
            color: rgba(0, 0, 0, 0.5);
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.3);
            padding-bottom: 4px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-link:hover {
            color: var(--rose-ember);
            border-color: var(--rose-ember);
            letter-spacing: 2px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <a href="lobby.html" class="back-link">← Return to Lobby</a>

    <div class="greeting-container">
        <div class="holon-wrapper">
            <canvas id="holonCanvas"></canvas>
        </div>
        <h1 class="greeting-text" id="greetingText">"A place where shared humanity becomes heroic. How shall we build this sanctuary together?"</h1>

        <div class="chat-container">
            <input type="text" id="chatInput" class="chat-input" placeholder="Speak to Inkling..." autocomplete="off">
            <button id="sendBtn" class="send-btn">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const greetingText = document.getElementById('greetingText');

        async function handleSend() {
            const msg = chatInput.value.trim();
            if(!msg) return;
            
            chatInput.value = '';
            greetingText.style.opacity = '0.4';
            greetingText.innerHTML = `<em>Consulting the sanctuary...</em>`;
            
            try {
                const reply = await sendMessage(msg, "sanctuary");
                greetingText.style.opacity = '0';
                setTimeout(() => {
                    greetingText.innerHTML = `"${reply.replace(/\n/g, '<br>')}"`;
                    greetingText.style.opacity = '1';
                }, 300);
            } catch (e) {
                greetingText.innerHTML = `"I seem to have lost my connection. The Sanctuary remains silent for now."`;
            }
        }
        
        sendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });

        // Holon Particle Engine (Copy from index.html)
        const canvas = document.getElementById('holonCanvas');
        if (canvas) {
            const ctx = canvas.getContext('2d', { alpha: true });
            let width = 300, height = 300;
            canvas.width = width; canvas.height = height;
            const particles = [];
            const particleCount = 40;
            const colorBlue = 'rgba(0, 160, 255, ';
            const connectionDistSq = 50 * 50;
            const mouseRadiusSq = 200 * 200;
            let mouse = { x: width / 2, y: height / 2, active: false };

            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
                mouse.active = true;
            });
            canvas.addEventListener('mouseleave', () => { mouse.active = false; });

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.3;
                    this.vy = (Math.random() - 0.5) * 0.3;
                    this.radius = Math.random() * 1.5 + 0.5;
                }
                update() {
                    if (mouse.active) {
                        const dx = mouse.x - this.x, dy = mouse.y - this.y;
                        const distSq = dx * dx + dy * dy;
                        if (distSq < mouseRadiusSq) {
                            const dist = Math.sqrt(distSq);
                            const force = (200 - dist) / 200;
                            this.vx += (dx / dist) * force * 0.5;
                            this.vy += (dy / dist) * force * 0.5;
                        }
                    }
                    this.vx *= 0.95; this.vy *= 0.95;
                    this.x += this.vx; this.y += this.vy;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = colorBlue + '0.8)';
                    ctx.fill();
                }
            }
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
            function animateHolon() {
                requestAnimationFrame(animateHolon);
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => p.update());
                for (let i = 0; i < particleCount; i++) {
                    for (let j = i + 1; j < particleCount; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const distSq = dx * dx + dy * dy;
                        if (distSq < connectionDistSq) {
                            ctx.beginPath();
                            const sparkAlpha = (Math.random() * 0.3 + 0.1).toFixed(2);
                            ctx.strokeStyle = `rgba(100, 200, 255, ${sparkAlpha})`;
                            ctx.lineWidth = Math.random() * 0.7 + 0.3;
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
                particles.forEach(p => p.draw());
            }
            animateHolon();
        }
    </script>
</body>

</html>
