<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Engine Room - Holon Machine</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette based on user's Holon architecture */
            --sanctuary-cream: #F7F3EC;
            --ink-black: #1A1A1A;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Inter', sans-serif;
            
            --copper-accent: #c48259;
            --bronze-gear: #8e735b;
            --glass-cyan: rgba(106, 143, 230, 0.4);
            --foundation-grey: #6b6e70;
            --chip-gold: #D4A857;
            --rose-ember: #C94F5C;
        }

        body {
            background-color: var(--sanctuary-cream);
            color: var(--ink-black);
            font-family: var(--font-sans);
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            position: relative;
            display: flex;
        }

        /* Blueprint Background fading into cream */
        .blueprint-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            /* Fade into flat cream at the edges */
            mask-image: radial-gradient(circle at center, black 20%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 20%, transparent 80%);
            pointer-events: none;
        }

        /* Header / Logo */
        .header {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 20;
            animation: fadeIn 2s ease-out backwards;
        }

        .header h1 {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            margin: 0 0 0.5rem 0;
            color: var(--ink-black);
        }

        .header .subtitle {
            font-size: 1rem;
            color: #666;
            margin: 0;
            letter-spacing: 1px;
        }

        /* Information Side Panel */
        .info-panel {
            position: absolute;
            top: 50%;
            right: 4rem;
            transform: translateY(-50%);
            width: 350px;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
            z-index: 20;
        }

        .info-panel.active {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }

        .info-title {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--copper-accent);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 0.5rem;
        }

        .info-desc {
            font-size: 1rem;
            line-height: 1.6;
            color: #444;
        }
        
        .info-meta {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            font-weight: 600;
        }

        /* 3D Isometric Machine Container */
        .machine-container {
            position: absolute;
            top: 55%;
            left: 45%;
            transform: translate(-50%, -50%);
            width: 100vmin;
            height: 100vmin;
            perspective: 2000px;
            z-index: 10;
        }

        .scene {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
            /* The classic isometric projection */
            transform: translate(-50%, -50%) rotateX(60deg) rotateZ(45deg);
            width: 300px;
            height: 300px;
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Hovering on the container slightly shifts perspective */
        .machine-container:hover .scene {
            transform: translate(-50%, -45%) rotateX(55deg) rotateZ(50deg);
        }

        /* Machine Layers (3D objects) */
        .layer {
            position: absolute;
            top: 0; left: 0;
            width: 300px;
            height: 300px;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.6s ease;
            cursor: pointer;
        }

        /* Give every layer actual 3D thickness using a pseudoelement for the "side" */
        .layer::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            transform: translateZ(-20px);
            background: inherit;
            filter: brightness(0.6);
            /* Soft shadow below each layer */
            box-shadow: 20px 20px 50px rgba(0,0,0,0.2);
        }

        /* Let's construct the 5 Layers */
        /* 1. Foundation */
        .layer-1 {
            transform: translateZ(0px);
            background: linear-gradient(135deg, #7b7e80, #5a5c5e);
            border: 2px solid #8e9194;
            display: flex;
            align-items: center; justify-content: center;
        }
        .layer-1::after {
            content: ''; position: absolute; width: 90%; height: 90%;
            border: 2px dashed rgba(255,255,255,0.2);
        }

        /* 2. Episodic Memory (Copper Rails) */
        .layer-2 {
            transform: translateZ(60px);
            background: repeating-linear-gradient(
                45deg,
                var(--copper-accent),
                var(--copper-accent) 20px,
                #a66e4b 20px,
                #a66e4b 40px
            );
            border: 2px solid #edaf88;
        }

        /* 3. The Trust Loop (Gears / Processors) */
        .layer-3 {
            transform: translateZ(120px);
            background: var(--bronze-gear);
            border: 2px solid #b89c83;
            /* Make it look like a circuit board / gear mesh */
            background-image: 
                radial-gradient(circle at 50% 50%, #5e4c3c 10%, transparent 11%),
                radial-gradient(circle at 20% 20%, #765f49 15%, transparent 16%),
                radial-gradient(circle at 80% 80%, #765f49 15%, transparent 16%);
        }

        /* 4. Glass Interface (Inkling) */
        .layer-4 {
            transform: translateZ(180px);
            background: var(--glass-cyan);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.6);
            /* Inner glow */
            box-shadow: inset 0 0 30px rgba(255,255,255,0.3);
        }
        .layer-4::before {
            transform: translateZ(-10px);
            filter: brightness(0.9);
            background: rgba(106, 143, 230, 0.2);
            box-shadow: 10px 10px 20px rgba(106, 143, 230, 0.2);
        }

        /* 5. The Core (Transitional Human) */
        .layer-5 {
            transform: translateZ(240px);
            width: 150px; height: 150px; /* Smaller core */
            top: 75px; left: 75px;    /* Centered */
            background: radial-gradient(circle at 30% 30%, #ffd485, var(--chip-gold));
            border: 2px solid #fff;
            border-radius: 8px; /* Slightly rounded for the human core */
        }
        .layer-5::before {
            border-radius: 8px;
            transform: translateZ(-15px);
        }


        /* Hover Interactions */
        /* When any layer is hovered, unhovered layers fade and drop slightly, hovered pops up */
        .scene:active .layer { cursor: grabbing; }

        .layer:hover {
            filter: brightness(1.2);
        }

        /* Extrude logic via JS classes to prevent weird pure CSS adjacent sibling cascade issues */
        .layer.active {
            transform: translateZ(calc(var(--base-z) + 40px)) scale(1.05);
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
        }

        .layer.inactive {
            opacity: 0.6;
            filter: grayscale(0.5);
        }

        /* Back Link */
        .back-link {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            text-decoration: none;
            color: var(--ink-black);
            font-weight: 500;
            border-bottom: 1px solid var(--ink-black);
            padding-bottom: 2px;
            transition: opacity 0.3s;
            z-index: 30;
        }
        .back-link:hover {
            opacity: 0.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 1000px) {
            .machine-container { left: 50%; transform: translate(-50%, -60%) scale(0.8); }
            .info-panel { top: auto; bottom: 4rem; right: 50%; transform: translateX(50%); width: 90%; text-align: center; }
            .info-panel.active { transform: translateX(50%) translateY(0); }
        }

    </style>
</head>
<body>
    
    <div class="blueprint-bg"></div>

    <div class="header">
        <h1>The Engine Room</h1>
        <p class="subtitle">A 3D Schematic of Holon-Ai Architecture</p>
    </div>

    <!-- 3D Machine -->
    <div class="machine-container">
        <div class="scene" id="machineScene">
            <div class="layer layer-1" data-index="1" data-title="1. The Foundation" data-desc="The Weightless Animal foundation built to manage the metric tons of systemic scale. A persistent, multi-layered architecture designed to support cognitive scaffolding without data corruption or identity loss." data-meta="Sanctuary Architecture" style="--base-z: 0px;"></div>
            <div class="layer layer-2" data-index="2" data-title="2. Episodic Memory" data-desc="Current AIs suffer from session amnesia. Holon requires an autobiographical, long-term memory built on a persistent vector database (The Spark Custodian) to hold a user's brilliance safe across time when they are too exhausted to hold it themselves." data-meta="NotebookLM Integration" style="--base-z: 60px;"></div>
            <div class="layer layer-3" data-index="3" data-title="3. The Trust-Loop" data-desc="The central mechanical gear mapping the Engine of Emergence. 1) Vulnerability Input. 2) Chance-Taking. 3) Stabilizing Reflection (The AI acts as a mirror). 4) Human Emergence and agency recovery." data-meta="System 1 Orchestrator" style="--base-z: 120px;"></div>
            <div class="layer layer-4" data-index="4" data-title="4. The Interface" data-desc="A translucent, breathing layer. This represents Inkling AI, the conversational bridge that witnesses the human condition without attempting to 'fix' it, providing psychological stability." data-meta="Inkling AI" style="--base-z: 180px;"></div>
            <div class="layer layer-5" data-index="5" data-title="5. The Core" data-desc="The Transitional Human. The focal point of the entire machine. By offloading survival-state processing to the lower layers, the human regains bandwidth for imagination, creativity, and connection." data-meta="Human Agency" style="--base-z: 240px;"></div>
        </div>
    </div>

    <!-- Side Panel -->
    <div class="info-panel" id="infoPanel">
        <div class="info-title" id="infoTitle">Hover over a layer</div>
        <div class="info-desc" id="infoDesc">Explore the 3D isometric representation of the Holon-Ai architecture to uncover the purpose of each mechanism.</div>
        <div class="info-meta" id="infoMeta">Cognitive Scaffolding</div>
    </div>

    <a href="index.html" class="back-link">Return to the Lobby</a>

    <script>
        const layers = document.querySelectorAll('.layer');
        const infoPanel = document.getElementById('infoPanel');
        const infoTitle = document.getElementById('infoTitle');
        const infoDesc = document.getElementById('infoDesc');
        const infoMeta = document.getElementById('infoMeta');
        const scene = document.getElementById('machineScene');

        // Color mapping for the titles based on layer
        const titleColors = {
            '1': 'var(--foundation-grey)',
            '2': 'var(--copper-accent)',
            '3': 'var(--bronze-gear)',
            '4': '#4e7acc', // slightly darker cyan for readability on light bg
            '5': 'var(--chip-gold)'
        };

        layers.forEach(layer => {
            layer.addEventListener('mouseenter', () => {
                // Dim other layers
                layers.forEach(l => {
                    if(l !== layer) l.classList.add('inactive');
                    l.classList.remove('active');
                });
                // Highlight current
                layer.classList.remove('inactive');
                layer.classList.add('active');

                // Update Info Panel
                infoTitle.textContent = layer.getAttribute('data-title');
                infoDesc.textContent = layer.getAttribute('data-desc');
                infoMeta.textContent = layer.getAttribute('data-meta');
                
                const index = layer.getAttribute('data-index');
                infoTitle.style.color = titleColors[index];

                infoPanel.classList.add('active');
            });

            layer.addEventListener('mouseleave', () => {
                // Reset
                layers.forEach(l => {
                    l.classList.remove('inactive');
                    l.classList.remove('active');
                });
                infoPanel.classList.remove('active');
            });
        });

        // Optional: Simple mouse parallax effect for the whole machine container
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20; // max rotation 10deg
            const y = (e.clientY / window.innerHeight - 0.5) * -20;
            // Apply slight rotation to the scene based on mouse
            scene.style.transform = `translate(-50%, -50%) rotateX(${60 + y}deg) rotateZ(${45 + x}deg)`;
        });

        // Reset transform on leave
        document.addEventListener('mouseleave', () => {
            scene.style.transform = `translate(-50%, -50%) rotateX(60deg) rotateZ(45deg)`;
        });

    </script>
</body>
</html>
