<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Engine Room | System 3 Architecture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Technical HUD Overlay -->
    <div class="hud-monitor">
        <div class="hud-scanline"></div>
        <div class="hud-corner top-left">ENGINE_ACCESS_GRANTED</div>
        <div class="hud-corner top-right">CORE: HOLON_ENGINE_v3.0</div>
        <div class="hud-corner bottom-left">OS_SUBSTRATE: DEEP_PERSISTENCE</div>
        <div class="hud-corner bottom-right">AUTO_OPTIMIZE: ACTIVE</div>
    </div>

    <div class="ambient-light glow-1"></div>
    <div class="ambient-light glow-2"></div>

    <canvas id="steam-canvas"></canvas>

    <a href="lobby.html" class="hud-corner top-left back-monitor">&larr; SANCTUARY</a>

    <main class="engine-room">
        <header class="engine-header">
            <h1 class="greeting-text">System 3 Architecture</h1>
            <p class="room-subtitle">TRANSLATING HUMAN COGNITION INTO PROPRIETARY AI MECHANICS</p>
        </header>

        <div class="gears-container">
            <!-- Central Substrate (STM/PM) -->
            <div class="main-gear">
                <div class="node-title main-gear-label">STM/PM SUBSTRATE</div>
            </div>

            <div class="trust-node node-1" data-desc="The Witness Architecture: Narrative-based memory utilizing persistent vector databases to ensure the AI remembers your journey beyond the session.">
                <span class="node-num">P_01</span>
                <span class="node-title">Episodic Memory</span>
                <div class="gauge-container"><div class="gauge-fill"></div></div>
            </div>

            <div class="trust-node node-2" data-desc="Modeling the Transitional Human: An explicit User Model that tracks psychological states on a spectrum from 'Survival' to 'Creation'.">
                <span class="node-num">P_02</span>
                <span class="node-title">Theory of Mind</span>
                <div class="gauge-container"><div class="gauge-fill"></div></div>
            </div>

            <div class="trust-node node-3" data-desc="The Executive Monitor: An always-on watchdog that audits reasoning to enforce the Prime Directive: 'Witness, Don't Fix'.">
                <span class="node-num">P_03</span>
                <span class="node-title">Meta-Cognition</span>
                <div class="gauge-container"><div class="gauge-fill"></div></div>
            </div>

            <div class="trust-node node-4" data-desc="The Drive Toward Emergence: Internal reward generators that prioritize shifting the user from chaos to clarity rather than simple task completion.">
                <span class="node-num">P_04</span>
                <span class="node-title">Intrinsic Motivation</span>
                <div class="gauge-container"><div class="gauge-fill"></div></div>
            </div>
        </div>

        <div id="node-info" class="node-details">
            <h3 id="detail-title"></h3>
            <p id="detail-desc"></p>
        </div>

        <button class="chat-send engine-handshake-btn" id="handshake">Initialize Handshake_Init</button>
        <div class="spark-container" id="sparks"></div>
    </main>

    <script>
        const nodes = document.querySelectorAll('.trust-node');
        const detailBox = document.getElementById('node-info');
        const detailTitle = document.getElementById('detail-title');
        const detailDesc = document.getElementById('detail-desc');

        nodes.forEach(node => {
            node.addEventListener('click', () => {
                const title = node.querySelector('.node-title').innerText;
                const desc = node.getAttribute('data-desc');
                
                detailTitle.innerText = title;
                detailDesc.innerText = desc;
                detailBox.classList.add('active');
            });
        });

        // Sovereign Handshake Spark Animation
        const handshakeBtn = document.getElementById('handshake');
        const sparksContainer = document.getElementById('sparks');

        handshakeBtn.addEventListener('click', () => {
            handshakeBtn.innerText = "Handshake_Init --target:Inkling";
            for (let i = 0; i < 50; i++) {
                createSpark();
            }
            setTimeout(() => {
                handshakeBtn.innerText = "Initialize Handshake_Init";
            }, 3000);
        });

        function createSpark() {
            const spark = document.createElement('div');
            spark.className = 'spark';
            
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight;
            const destX = window.innerWidth / 2;
            const destY = window.innerHeight / 2 + 50;

            spark.style.left = startX + 'px';
            spark.style.top = startY + 'px';
            sparksContainer.appendChild(spark);

            const animation = spark.animate([
                { left: startX + 'px', top: startY + 'px', opacity: 1, transform: 'scale(1)' },
                { left: destX + 'px', top: destY + 'px', opacity: 0, transform: 'scale(0)' }
            ], {
                duration: 1000 + Math.random() * 1000,
                easing: 'cubic-bezier(0.4, 0, 0.2, 1)'
            });

            animation.onfinish = () => spark.remove();
        }

        // Atmospheric Steam Effect
        const steamCanvas = document.getElementById('steam-canvas');
        const sctx = steamCanvas.getContext('2d');
        let sw, sh;

        function resizeSteam() {
            sw = steamCanvas.width = window.innerWidth;
            sh = steamCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeSteam);
        resizeSteam();

        class Cloud {
            constructor() {
                this.x = Math.random() * sw;
                this.y = sh + Math.random() * 50;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = -Math.random() * 1 - 0.5;
                this.size = Math.random() * 50 + 50;
                this.opacity = Math.random() * 0.2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.y < -this.size) this.y = sh + this.size;
            }
            draw() {
                sctx.fillStyle = `rgba(200, 200, 200, ${this.opacity})`;
                sctx.beginPath();
                sctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                sctx.fill();
            }
        }

        const clouds = Array.from({ length: 20 }, () => new Cloud());
        function animateSteam() {
            sctx.clearRect(0, 0, sw, sh);
            clouds.forEach(c => { c.update(); c.draw(); });
            requestAnimationFrame(animateSteam);
        }
        animateSteam();
    </script>
</body>
</html>
