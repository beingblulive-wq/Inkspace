name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker gcr.io

      - name: Build Docker image
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/inkspace-api:latest .

      - name: Push to Google Container Registry
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/inkspace-api:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy inkspace-api \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/inkspace-api:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }},INKSPACE_PRIMARY_API_KEY=${{ secrets.INKSPACE_PRIMARY_API_KEY }},GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }},NOTEBOOK_ID=${{ secrets.NOTEBOOK_ID }} \
            --quiet
