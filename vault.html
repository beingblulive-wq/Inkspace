<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Halls of Reflection</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --sanctuary-cream: #F7F3EC;
            --ink-black: #1A1A1A;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Inter', sans-serif;
            --legacy-gold: #D4A857;
        }

        body {
            background-color: var(--ink-black);
            /* Vault is dark and private */
            color: var(--sanctuary-cream);
            font-family: var(--font-sans);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            animation: fadeIn 2s ease-out backwards;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 4rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 3.5rem;
            margin-bottom: 2rem;
            color: var(--legacy-gold);
            font-weight: 400;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.7;
            line-height: 1.8;
            margin-bottom: 3rem;
            font-weight: 300;
        }

        .flourish {
            width: 40px;
            height: 2px;
            background: var(--legacy-gold);
            margin: 0 auto 2rem auto;
            opacity: 0.5;
        }

        .back-link {
            display: inline-block;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 4px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: var(--sanctuary-cream);
            border-color: var(--sanctuary-cream);
            letter-spacing: 2px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>The Halls of Reflection</h1>
        <div class="flourish"></div>
        <p>A deep, encrypted space for Autobiography Mode and journaling. A sanctuary for the mind, currently resting
            while preparations are made.</p>
        <a href="index.html" class="back-link">Return to Lobby</a>
    </div>
</body>

</html>
